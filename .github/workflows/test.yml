name: CI

on:
  push:
    branches: [main, ci-*]
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 16.x
          cache: npm

      - uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-16.x-${{ hashFiles('package-lock.json') }}

      - run: npm install

  test:
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 16.x
          cache: npm

      - uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-16.x-${{ hashFiles('package-lock.json') }}

      - run: npm install
      - run: npm run lint:format
      - run: npm run lint
      - run: npm run build
      - run: npm run test:ci

  cypress:
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 16.x
          cache: npm

      - uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-16.x-${{ hashFiles('package-lock.json') }}

      - run: npm install
      - run: npm run build:cypress

      - name: Cypress run
        uses: cypress-io/github-action@v4
        with:
          cache-key: ${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          project: ./packages/editor
          component: true
          browser: chrome
          quiet: true
          record: false
